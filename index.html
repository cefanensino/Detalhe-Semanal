.gs-login-card {
  width: 100%;
  max-width: 420px;
  background: rgba(9,15,10,0.97);
  border: 1.5px solid rgba(198,255,61,0.55);
  border-radius: 26px;
  padding: 40px 34px;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 30px 70px rgba(0,0,0,0.55), 0 0 55px rgba(198,255,61,0.08);
}
.gs-login-eyebrow { display: none; }
.gs-login-title {
  font-size: 52px;
  line-height: 1.1;
  margin: 0 0 6px;
  text-align: center;
  color: var(--volt);
  text-shadow: 0 0 26px rgba(198,255,61,0.35);
  letter-spacing: 0.04em;
}
.gs-login-subtitle {
  font-size: 15px;
  line-height: 1.3;
  margin: 0 0 30px;
  text-align: center;
  color: var(--muted);
  letter-spacing: 0.06em;
}
.gs-field-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em;
  color: #9db894; display: block; margin: 22px 0 8px;
}
.gs-login-input-wrap { position: relative; }
.gs-login-input-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: #7c9678; display: flex; pointer-events: none;
}
.gs-login-input-icon svg { width: 18px; height: 18px; }
.gs-nip-input {
  width: 100%; font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; letter-spacing: 0.03em;
  padding: 15px 16px 15px 44px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.09);
  background: #131d15; color: #EDEDED; outline: none; transition: border-color 0.15s ease;
}
.gs-nip-input::placeholder { color: #5f7259; }
.gs-nip-input:focus { border-color: var(--volt); }
.gs-role-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.gs-role-btn {
  border: 1.5px solid rgba(255,255,255,0.1); background: #10160f; border-radius: 12px; padding: 14px 6px;
  cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; font-size: 12.5px; font-weight: 600;
  color: #cfd6cd; transition: all 0.15s ease; display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.gs-role-btn svg { width: 18px; height: 18px; }
.gs-role-btn:hover { border-color: rgba(198,255,61,0.4); }
.gs-role-btn.gs-active {
  background: rgba(198,255,61,0.08); border-color: var(--volt); color: #fff;
  box-shadow: 0 0 0 1px rgba(198,255,61,0.15), 0 0 18px rgba(198,255,61,0.18);
}
.gs-role-btn.gs-active svg { color: var(--volt); }
.gs-enter-btn {
  width: 100%; margin-top: 28px; padding: 16px; border-radius: 14px; border: none;
  background: var(--volt); color: #16210f; font-weight: 700; font-size: 16px; cursor: pointer;
  transition: transform 0.1s ease, box-shadow 0.15s ease;
  box-shadow: 0 10px 30px rgba(198,255,61,0.25);
}
.gs-enter-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
.gs-enter-btn:not(:disabled):hover { transform: translateY(-1px); }

<script>
(function(){

  const SLOTS = [

    { period: "8°",  start: "15:20", end: "16:10" },

  const SUBJECTS = {
    "Fisiologia II": "#C6FF3D",
    "Anatomia II": "#FF5D5D",
    "Basquete II": "#3D6DFF",

  };

  const STORAGE_KEY = "gs-turma-schedule-v3";
  const root = document.getElementById('gsRoot');

  const ICON_PERSON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.5-7 8-7s8 3 8 7"/></svg>`;
  const ICON_SHIELD = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v6c0 5-3.5 8-7 9-3.5-1-7-4-7-9V6l7-3z"/><path d="M9 12l2 2 4-4"/></svg>`;
  const ICON_CLIPBOARD = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="16" rx="2"/><path d="M9 4V3a1 1 0 011-1h4a1 1 0 011 1v1"/><path d="M9 11h6M9 15h4"/></svg>`;
  const ICON_CLOCK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>`;
  const ICON_BOOK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5A2.5 2.5 0 016.5 3H12v17H6.5A2.5 2.5 0 014 17.5v-12z"/><path d="M20 5.5A2.5 2.5 0 0017.5 3H12v17h5.5a2.5 2.5 0 002.5-2.5v-12z"/></svg>`;
  const ICON_PIN = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.2 7-11.5A7 7 0 105 9.5C5 14.8 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.4"/></svg>`;

  const SUBJECT_ICONS = {
    "Fisiologia II": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,13 7,13 9,7 13,19 15,13 22,13"/></svg>`,
    "Anatomia II": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="7" r="2.2"/><circle cx="18" cy="17" r="2.2"/><line x1="7.6" y1="8.6" x2="16.4" y2="15.4"/></svg>`,
    "Basquete II": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18M5.8 5.8c2.8 3 2.8 9.4 0 12.4M18.2 5.8c-2.8 3-2.8 9.4 0 12.4"/></svg>`,
    "Vôlei II": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 016 15.5M3.6 9.5A9 9 0 0112 12a9 9 0 018.4-2.5"/></svg>`,
    "Medidas e Avaliação II": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8.5" width="18" height="7" rx="1.2"/><path d="M7 8.5v3M11 8.5v3M15 8.5v3"/></svg>`,
    "Ginástica II": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5l2.6 5.9 6.4.7-4.8 4.3 1.3 6.3L12 16.6l-5.5 3.1 1.3-6.3-4.8-4.3 6.4-.7z"/></svg>`,
    "Natação II": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12.5c1.5-2 3.5-2 5 0s3.5 2 5 0 3.5-2 5 0 3.5 2 5 0"/><path d="M2 17.5c1.5-2 3.5-2 5 0s3.5 2 5 0 3.5-2 5 0 3.5 2 5 0"/></svg>`,
  };
  function subjectIcon(s){ return SUBJECT_ICONS[s] || ICON_BOOK; }

  let session = null; // {nip, name, role, subjects?: []}
  let classes = [];   // {id, day, slotIndex, subject, observations:[], materials:[]}
  let workload = {};  // { [subject]: { cht: number, chm: number } }
  let instructorProfiles = []; // [{ id, nip, name, subjects: [subjectName, ...] }]
  let adminProfiles = []; // [{ id, nip, name }] — administradores cadastrados com acesso total
  const HOST_ADMIN = { nip: "16017757", name: "3SG-EP OLIVEIRA" }; // administrador-host fixo: sempre tem acesso, não fica salvo na lista e não pode ser removido
  let commitments = []; // [{ id, title, date: 'YYYY-MM-DD', day, time, local, obs, ts }]
  let subjectMaterials = {}; // { [subject]: [{ id, text, author, ts, file: {name,type,size,dataUrl} }] }
  let customSubjects = {}; // { [subject]: colorHex } — matérias cadastradas pelo admin, além das pré-definidas
  const SUBJECT_COLOR_PALETTE = ["#C6FF3D", "#FF5D5D", "#3D6DFF", "#8B5CF6", "#F5A623", "#2BB3A3", "#FF6FA5"];
  const COMMIT_COLOR = "#FF5D5D"; // mesma cor de --coral, usada para os cards de compromisso na grade
  const MONTH_NAMES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  let weekStart = startOfWeek(new Date()); // Date (00:00) do domingo da semana exibida na grade

  // ---------------- HELPERS: DATAS / SEMANA ----------------
  function pad2(n){ return String(n).padStart(2, '0'); }
  function toISODate(d){ return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
  function parseISODate(s){
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d);
  }
  function addDays(d, n){ const r = new Date(d); r.setDate(r.getDate() + n); return r; }
  function startOfWeek(d){
    const r = new Date(d);
    r.setHours(0, 0, 0, 0);
    r.setDate(r.getDate() - r.getDay());
    return r;
  }
  function fmtDateShort(d){ return pad2(d.getDate()) + '/' + pad2(d.getMonth() + 1); }
  function dateForDayIndex(dIdx){ return addDays(weekStart, dIdx); }
  function weeksInMonth(year, monthIdx){
    // retorna os domingos (início de semana) cujo domingo cai dentro do mês/ano informados
    const weeks = [];
    const lastDay = new Date(year, monthIdx + 1, 0).getDate();
    for (let day = 1; day <= lastDay; day++) {
      const d = new Date(year, monthIdx, day);
      if (d.getDay() === 0) weeks.push(d);
    }
    return weeks;
  }

  function uid(){ return Math.random().toString(36).slice(2,10); }
  function subjColor(s){ return SUBJECTS[s] || "#9AA69B"; }
  function shadeColor(hex, percent){
    const f = parseInt(hex.slice(1), 16);
    const t = percent < 0 ? 0 : 255;
    const p = Math.abs(percent) / 100;
    const R = f >> 16, G = (f >> 8) & 0x00FF, B = f & 0x0000FF;
    const val = 0x1000000
      + (Math.round((t - R) * p) + R) * 0x10000
      + (Math.round((t - G) * p) + G) * 0x100
      + (Math.round((t - B) * p) + B);
    return "#" + val.toString(16).slice(1);
  }
  function esc(s){
    const d = document.createElement('div');
    d.textContent = s == null ? '' : s;
    return d.innerHTML;
  }
  function toMinutes(t){ const [h,m] = t.split(':').map(Number); return h*60+m; }
  function slotHours(slot){ return (toMinutes(slot.end) - toMinutes(slot.start)) / 60; }
  // Substitui window.confirm: dentro deste ambiente de pré-visualização (iframe em sandbox),
  // o confirm() nativo do navegador pode ser bloqueado e retornar undefined/false na hora,
  // fazendo qualquer ação protegida por confirm() parecer "não funcionar". Este modal próprio
  // resolve isso de forma confiável.
  function askConfirm(message){
    return new Promise((resolve) => {
      const overlay = document.createElement('div');
      overlay.className = 'gs-modal-overlay';
      overlay.innerHTML = `
        <div class="gs-modal" style="max-width:360px">
          <p style="margin:0 0 20px; color:var(--ink); font-size:15px; line-height:1.4">${esc(message)}</p>
          <div class="gs-modal-actions">
            <button class="gs-btn-secondary" id="gsConfirmNo">Cancelar</button>
            <button class="gs-btn-danger" id="gsConfirmYes" style="flex:1">Confirmar</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      const cleanup = (result) => { overlay.remove(); resolve(result); };
      overlay.querySelector('#gsConfirmNo').addEventListener('click', () => cleanup(false));
      overlay.querySelector('#gsConfirmYes').addEventListener('click', () => cleanup(true));
      overlay.addEventListener('click', (e) => { if (e.target === overlay) cleanup(false); });
    });
  }
  function fmtHours(n){
    const totalMin = Math.round((n || 0) * 60);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return m === 0 ? `${h}h` : `${h}h${String(m).padStart(2, '0')}`;
  }
  const MAX_FILE_BYTES = 1.2 * 1024 * 1024; // limite conservador: os dados ficam salvos em um único storage compartilhado
  function fmtFileSize(bytes){
    if (!bytes && bytes !== 0) return '';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return Math.round(bytes / 1024) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }
  function getWorkload(subject){
    if (!workload[subject]) workload[subject] = { cht: 0, chm: 0 };
    return workload[subject];
  }
  function getSubjectMaterials(subject){
    return subjectMaterials[subject] || [];
  }
  function weeklyHours(subject){
    const wk = toISODate(weekStart);
    return classes
      .filter(c => c.subject === subject && c.week === wk)
      .reduce((sum, c) => sum + slotHours(SLOTS[c.slotIndex]), 0);
  }

  async function loadData(){
    try {
      const docSnap = await db.collection('gradeSemanal').doc('estado').get();
      const parsed = docSnap.exists && docSnap.data().json ? JSON.parse(docSnap.data().json) : null;
      classes = (parsed && parsed.classes) || [];
      workload = (parsed && parsed.workload) || {};
      const rawInstructors = parsed && parsed.instructors;
      if (Array.isArray(rawInstructors)) {
        instructorProfiles = rawInstructors;
      } else if (rawInstructors && typeof rawInstructors === 'object') {
        // migração do formato antigo: { [subject]: {nip, name} } -> perfis com subjects[]
        const byNip = {};
        Object.keys(rawInstructors).forEach(subject => {
          const old = rawInstructors[subject];
          if (!old) return;
          if (!byNip[old.nip]) byNip[old.nip] = { id: uid(), nip: old.nip, name: old.name, subjects: [] };
          byNip[old.nip].subjects.push(subject);
        });
        instructorProfiles = Object.values(byNip);
      } else {
        instructorProfiles = [];
      }
      adminProfiles = Array.isArray(parsed && parsed.admins) ? parsed.admins : [];
      customSubjects = (parsed && parsed.customSubjects) || {};
      Object.keys(customSubjects).forEach(name => { SUBJECTS[name] = customSubjects[name]; });
      commitments = (parsed && parsed.commitments) || [];
      subjectMaterials = (parsed && parsed.subjectMaterials) || {};
      weekStart = (parsed && parsed.weekStart) ? parseISODate(parsed.weekStart) : startOfWeek(new Date());
      // migração: aulas salvas antes da grade ser por semana não tinham campo 'week' —
      // atribuímos a elas a semana que estava salva, para não perder os dados existentes.
      const fallbackWeek = toISODate(weekStart);
      classes.forEach(c => { if (!c.week) c.week = fallbackWeek; });
    } catch(e){
      classes = []; workload = {}; instructorProfiles = []; adminProfiles = []; commitments = []; customSubjects = {}; subjectMaterials = {};
      weekStart = startOfWeek(new Date());
    }
  }
  async function saveData(){
    try {
      await db.collection('gradeSemanal').doc('estado').set({
        json: JSON.stringify({
          classes, workload, instructors: instructorProfiles, admins: adminProfiles, customSubjects, commitments, subjectMaterials, weekStart: toISODate(weekStart)
        })
      });
    }
    catch(e){ console.error('Erro ao salvar', e); }
  }
  function findClass(day, slotIndex){
    return classes.find(c => c.day === day && c.slotIndex === slotIndex && c.week === toISODate(weekStart));
  }
  function findCommitment(dIdx, slotIndex){
    const iso = toISODate(dateForDayIndex(dIdx));
    return commitments.find(cm => cm.date === iso && cm.slotIndex === slotIndex);
  }
  function findProfileByNip(nip){
    return instructorProfiles.find(p => p.nip === nip) || null;
  }
  function findAdminByNip(nip){
    if (nip === HOST_ADMIN.nip) return HOST_ADMIN;
    return adminProfiles.find(p => p.nip === nip) || null;
  }
  function findProfileForSubject(subject){
    return instructorProfiles.find(p => p.subjects && p.subjects.includes(subject)) || null;
  }
  function initials(name){
    return name.trim().split(/\s+/).slice(0,2).map(p => p[0].toUpperCase()).join('');
  }
  function calcChm(subject){
    // CHM (carga horária ministrada) é sempre recalculada a partir das aulas
    // realmente presentes na grade para essa matéria (em qualquer semana),
    // então nunca fica "presa" em um valor desatualizado.
    return classes
      .filter(c => c.subject === subject)
      .reduce((sum, c) => sum + slotHours(SLOTS[c.slotIndex]), 0);
  }
  async function addClass(day, slotIndex, subject){
    classes.push({ id: uid(), day, slotIndex, subject, week: toISODate(weekStart), local: '', observations: [], materials: [] });
    await saveData();
  }

  // ---------------- RENDER: LOGIN ----------------
  function renderLogin(errorMsg){
    renderLoginStepRole(errorMsg);
  }

  function renderLoginStepRole(errorMsg){
    root.innerHTML = `
      <div class="gs-login-wrap">
        <div class="gs-login-card">
          <h1 class="gs-display gs-login-title">CEFAN</h1>
          <p class="gs-display gs-login-subtitle">Superintendência de Ensino</p>
          <label class="gs-field-label">NIP</label>
          <div class="gs-login-input-wrap">
            <span class="gs-login-input-icon">${ICON_PERSON}</span>
            <input id="gsNip" class="gs-nip-input" placeholder="0000" maxlength="12" inputmode="numeric" autocomplete="off" value="${esc(renderLoginStepRole._nip || '')}" />
          </div>
          <label class="gs-field-label">NOME</label>
          <div class="gs-login-input-wrap">
            <span class="gs-login-input-icon">${ICON_PERSON}</span>
            <input id="gsName" class="gs-nip-input" placeholder="Como você quer ser identificado" autocomplete="off" value="${esc(renderLoginStepRole._name || '')}" />
          </div>
          <label class="gs-field-label" style="margin-bottom:10px">Você é</label>
          <div class="gs-role-grid">
            <button type="button" class="gs-role-btn" data-role="admin">${ICON_SHIELD}<span>Administrador</span></button>
            <button type="button" class="gs-role-btn" data-role="instrutor">${ICON_CLIPBOARD}<span>Instrutor</span></button>
            <button type="button" class="gs-role-btn" data-role="aluno">${ICON_PERSON}<span>Aluno</span></button>
          </div>
          <button id="gsEnterBtn" class="gs-enter-btn" disabled>Entrar</button>
          <p class="gs-login-error" id="gsLoginErr">${errorMsg ? esc(errorMsg) : ''}</p>
        </div>
      </div>
    `;
    const nipInput = document.getElementById('gsNip');
    const nameInput = document.getElementById('gsName');
    const roleBtns = root.querySelectorAll('.gs-role-btn');
    const enterBtn = document.getElementById('gsEnterBtn');
    const errEl = document.getElementById('gsLoginErr');
    let chosenRole = null;

    function refreshEnter(){
      enterBtn.disabled = !(nipInput.value.trim().length > 0 && chosenRole);
    }
    roleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const nip = nipInput.value.trim();

        if (btn.dataset.role !== 'instrutor' && nip && findProfileByNip(nip)) {
          errEl.textContent = 'Esse NIP está cadastrado como instrutor. Selecione o campo "Instrutor" para entrar.';
          return;
        }

        errEl.textContent = '';
        chosenRole = btn.dataset.role;
        roleBtns.forEach(b => b.classList.remove('gs-active'));
        btn.classList.add('gs-active');
        refreshEnter();
      });
    });
    nipInput.addEventListener('input', refreshEnter);
    nipInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !enterBtn.disabled) doLogin(); });
    enterBtn.addEventListener('click', doLogin);
    function doLogin(){
      const nip = nipInput.value.trim();
      const name = nameInput.value.trim();
      if (!nip || !chosenRole) return;

      if (chosenRole === 'instrutor') {
        const profile = findProfileByNip(nip);
        if (!profile) {
          errEl.textContent = 'Esse NIP ainda não está cadastrado como instrutor. Peça para um administrador te cadastrar em "Administrador › Cadastrar Instrutor".';
          return;
        }
        session = { nip, name: name || profile.name, role: 'instrutor', subjects: profile.subjects };
        renderDashboard();
        return;
      }

      if (findProfileByNip(nip)) {
        errEl.textContent = 'Esse NIP está cadastrado como instrutor. Selecione o campo "Instrutor" para entrar.';
        return;
      }

      if (chosenRole === 'admin') {
        // só o host fixo ou administradores cadastrados podem entrar como admin.
        if (!findAdminByNip(nip)) {
          errEl.textContent = 'Esse NIP ainda não está cadastrado como administrador. Peça para um administrador te cadastrar em "Administrador › Cadastrar Administrador".';
          return;
        }
        renderLoginStepRole._nip = nip;
        renderLoginStepRole._name = name;
        renderInstrutorChoice(nip, name);
        return;
      }

      session = { nip, name, role: chosenRole };
      renderDashboard();
    }
  }

  // ---------------- RENDER: LOGIN STEP 2 — ADMINISTRADOR: aba com dois cards (DSA / Cadastrar Instrutor) ----------------
  function renderInstrutorChoice(nip, name, errorMsg){
    root.innerHTML = `
      <div class="gs-login-wrap">
        <div class="gs-login-card">
          <button class="gs-login-back" id="gsBack">‹ Voltar</button>
          <h1 class="gs-display gs-login-step-title">Administrador</h1>
          <p class="gs-login-step-subtitle">NIP ${esc(nip)}${name ? ' · ' + esc(name) : ''}</p>

          <button type="button" class="gs-choice-card" data-choice="dsa">
            <span class="gs-choice-card-title gs-display">DSA</span>
            <span class="gs-choice-card-sub">Entrar no painel e ver a grade de horários</span>
          </button>
          <button type="button" class="gs-choice-card" data-choice="cadastro">
            <span class="gs-choice-card-title gs-display">Cadastrar Instrutor</span>
            <span class="gs-choice-card-sub">Cadastrar um novo instrutor e vincular matéria(s)</span>
          </button>
          <button type="button" class="gs-choice-card" data-choice="retirar">
            <span class="gs-choice-card-title gs-display">Remover Instrutor</span>
            <span class="gs-choice-card-sub">Remover um instrutor já cadastrado</span>
          </button>
          <button type="button" class="gs-choice-card" data-choice="cadastro-admin">
            <span class="gs-choice-card-title gs-display">Cadastrar Administrador</span>
            <span class="gs-choice-card-sub">Cadastrar um novo administrador com acesso total</span>
          </button>
          <button type="button" class="gs-choice-card" data-choice="retirar-admin">
            <span class="gs-choice-card-title gs-display">Remover Administrador</span>
            <span class="gs-choice-card-sub">Remover um administrador já cadastrado</span>
          </button>

          <button type="button" class="gs-login-outline-btn" id="gsVoltarBtn">Voltar</button>
          <p class="gs-login-error">${errorMsg ? esc(errorMsg) : ''}</p>
        </div>
      </div>
    `;
    document.getElementById('gsBack').addEventListener('click', () => renderLoginStepRole());
    document.getElementById('gsVoltarBtn').addEventListener('click', () => renderLoginStepRole());
    root.querySelector('[data-choice="dsa"]').addEventListener('click', () => {
      session = { nip, name, role: 'admin' };
      renderDashboard();
    });
    root.querySelector('[data-choice="cadastro"]').addEventListener('click', () => {
      renderInstrutorRegister(nip, name);
    });
    root.querySelector('[data-choice="retirar"]').addEventListener('click', () => {
      renderInstrutorRemove(nip, name);
    });
    root.querySelector('[data-choice="cadastro-admin"]').addEventListener('click', () => {
      renderAdminRegister(nip, name);
    });
    root.querySelector('[data-choice="retirar-admin"]').addEventListener('click', () => {
      renderAdminRemove(nip, name);
    });

  // ---------------- RENDER: COMPROMISSOS ----------------
  function renderCommitments(isAdmin){
    const section = document.getElementById('gsCommitSection');
    const list = document.getElementById('gsCommitList');
    if (!section || !list) return;
    if (!commitments.length) { section.style.display = 'none'; list.innerHTML = ''; return; }
    section.style.display = '';
    const sorted = [...commitments].sort((a,b) => a.ts - b.ts);
    list.innerHTML = sorted.map(cm => {
      const slot = (cm.slotIndex != null) ? SLOTS[cm.slotIndex] : null;
      const timeLabel = slot ? `${slot.start} às ${slot.end}` : (cm.time || '');
      return `
      <div class="gs-commit-item">
        <div class="gs-commit-info">
          <span class="gs-commit-title">${esc(cm.title)}</span>
          <span class="gs-commit-meta">${cm.date ? fmtDateShort(parseISODate(cm.date)) + ' · ' : ''}${esc(cm.day)}${timeLabel ? ' · ' + esc(timeLabel) : ''}${cm.local ? ' · ' + esc(cm.local) : ''}</span>
          ${cm.obs ? `<span class="gs-commit-obs">${esc(cm.obs)}</span>` : ''}
        </div>
        ${isAdmin ? `<button class="gs-commit-del" data-del-commit="${esc(cm.id)}" title="Remover compromisso">✕</button>` : ''}
      </div>
    `;
    }).join('');
    if (isAdmin) {
      list.querySelectorAll('[data-del-commit]').forEach(btn => {
        btn.addEventListener('click', async () => {
          commitments = commitments.filter(c => c.id !== btn.dataset.delCommit);
          await saveData();
          renderDashboard();
        });
      });
    }
  }

  function renderTimetable(isAdmin){
    const tt = document.getElementById('gsTimetable');
    let html = `<div class="gs-tt-cell gs-tt-corner">${ICON_CLOCK}<span>HORÁRIO</span></div>`;
    DAYS.forEach((d, dIdx) => {
      const dateObj = dateForDayIndex(dIdx);
      html += `<div class="gs-tt-cell gs-tt-daylabel"><span class="gs-display">${d}</span><span class="gs-tt-daylabel-date">${fmtDateShort(dateObj)}</span><span class="gs-tt-daylabel-underline"></span></div>`;
    });

    SLOTS.forEach((slot, sIdx) => {
      const isBreak = !slot.period;
      html += `
        <div class="gs-tt-cell gs-tt-timecell ${isBreak ? 'gs-tt-break' : ''}">
          <div class="gs-tt-period-row">
            ${ICON_CLOCK}
            ${slot.period ? `<span class="gs-tt-period">${slot.period}</span>` : ''}
          </div>
          <span class="gs-tt-time">${slot.start}<br/>às<br/>${slot.end}</span>
        </div>
      `;
      DAYS.forEach((d, dIdx) => {
        const c = findClass(dIdx, sIdx);
        const cm = findCommitment(dIdx, sIdx);
        html += `<div class="gs-tt-cell ${isBreak ? 'gs-tt-break' : ''}" data-cell-day="${dIdx}" data-cell-slot="${sIdx}">`;
        if (cm) {
          const tag = isAdmin ? 'button' : 'div';
          html += `
            <${tag} class="gs-slot-card gs-slot-card-commit" ${isAdmin ? `data-commit-detail="${cm.id}"` : ''} style="border-left-color:${shadeColor(COMMIT_COLOR,-25)}; background: linear-gradient(160deg, rgba(6,12,8,0.28), rgba(6,12,8,0.6)), linear-gradient(160deg, ${COMMIT_COLOR} 0%, ${shadeColor(COMMIT_COLOR,-42)} 100%)">
              <div class="gs-slot-card-topicons">
                <span class="gs-slot-badge" style="background:#fff; color:${COMMIT_COLOR}">${ICON_CLIPBOARD}</span>
              </div>
              <span class="gs-slot-card-name">${esc(cm.title)}<span class="gs-slot-card-underline" style="background:#fff"></span></span>
              ${cm.local ? `<span class="gs-slot-pill">${ICON_PIN}<span><b>Local:</b> ${esc(cm.local)}</span></span>` : ''}
              ${cm.obs ? `<span class="gs-slot-card-meta">${esc(cm.obs)}</span>` : ''}
            </${tag}>
          `;
        } else if (c) {
          const color = subjColor(c.subject);
          const nObs = (c.observations || []).length;
          const nMat = (c.materials || []).length;
          const inst = findProfileForSubject(c.subject);
          html += `
            <button class="gs-slot-card" data-detail="${c.id}" style="border-left-color:${shadeColor(color,-25)}; background: linear-gradient(160deg, rgba(6,12,8,0.28), rgba(6,12,8,0.6)), linear-gradient(160deg, ${color} 0%, ${shadeColor(color,-42)} 100%)">
              <div class="gs-slot-card-topicons">
                <span class="gs-slot-badge" style="background:#fff; color:${color}">${ICON_BOOK}</span>
                <span class="gs-slot-watermark">${subjectIcon(c.subject)}</span>
              </div>
              <span class="gs-slot-card-name">${esc(c.subject)}<span class="gs-slot-card-underline" style="background:#fff"></span></span>
              ${inst ? `
                <span class="gs-slot-pill">${ICON_PERSON}<span><b>Instrutor:</b> ${esc(inst.name || 'Instrutor')}</span></span>
              ` : ''}
              <span class="gs-slot-pill">${ICON_PIN}<span><b>Local:</b> ${esc(c.local || 'a definir')}</span></span>
              ${(nObs || nMat) ? `<span class="gs-slot-card-meta">${nObs ? nObs + ' obs.' : ''}${(nObs && nMat) ? ' · ' : ''}${nMat ? nMat + ' mat.' : ''}</span>` : ''}
            </button>
          `;
        } else if (isAdmin) {
          html += `<button class="gs-add-slot-btn" data-add-day="${dIdx}" data-add-slot="${sIdx}">+</button>`;
        }
        html += `</div>`;
      });
    });
    tt.innerHTML = html;

    tt.querySelectorAll('[data-detail]').forEach(btn => {
      btn.addEventListener('click', () => openDetailModal(btn.dataset.detail));
    });

    tt.querySelectorAll('[data-commit-detail]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const cm = commitments.find(x => x.id === btn.dataset.commitDetail);
        if (!cm) return;
        if (!(await askConfirm(`Remover o compromisso "${cm.title}"?`))) return;
        commitments = commitments.filter(x => x.id !== cm.id);
        await saveData();
        renderDashboard();
      });
    });

    if (isAdmin) {
      tt.querySelectorAll('[data-add-day]').forEach(btn => {
        btn.addEventListener('click', () => openAddModal(parseInt(btn.dataset.addDay), parseInt(btn.dataset.addSlot)));
      });

      tt.querySelectorAll('[data-cell-day]').forEach(cell => {
        const day = parseInt(cell.dataset.cellDay);
        const slotIndex = parseInt(cell.dataset.cellSlot);
        const occupied = !!findClass(day, slotIndex) || !!findCommitment(day, slotIndex);

        cell.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = occupied ? 'none' : 'copy';
          cell.classList.add(occupied ? 'gs-drop-reject' : 'gs-drop-hover');
        });
        cell.addEventListener('dragleave', () => {
          cell.classList.remove('gs-drop-hover', 'gs-drop-reject');
        });
        cell.addEventListener('drop', async (e) => {
          e.preventDefault();
          cell.classList.remove('gs-drop-hover', 'gs-drop-reject');
          if (occupied) return;
          const subject = e.dataTransfer.getData('text/plain');
          if (!subject || !SUBJECTS[subject]) return;
          await addClass(day, slotIndex, subject);
          renderDashboard();
        });
      });
    }
  }

  // ---------------- MODAL: ESCOLHER SEMANA (mês + semana) ----------------
  function openWeekPickerModal(){
    const today = new Date();
    // intervalo de meses disponíveis: 6 meses atrás até 12 meses à frente do mês atual
    const monthOptions = [];
    for (let offset = -6; offset <= 12; offset++) {
      const d = new Date(today.getFullYear(), today.getMonth() + offset, 1);
      monthOptions.push({ year: d.getFullYear(), month: d.getMonth() });
    }
    const currentMonthKey = weekStart.getFullYear() + '-' + weekStart.getMonth();
    let selectedMonthKey = monthOptions.some(o => (o.year + '-' + o.month) === currentMonthKey)
      ? currentMonthKey
      : (today.getFullYear() + '-' + today.getMonth());

    const overlay = document.createElement('div');
    overlay.className = 'gs-modal-overlay';
    overlay.innerHTML = `
      <div class="gs-modal">
        <h2 class="gs-display gs-modal-title">Escolher semana</h2>
        <p class="gs-modal-subtitle">Selecione o mês e a semana da grade</p>
        <label class="gs-field-label" style="margin-top:0">Mês</label>
        <select id="gsWeekMonth" class="gs-select">
          ${monthOptions.map(o => `<option value="${o.year}-${o.month}" ${(o.year + '-' + o.month) === selectedMonthKey ? 'selected' : ''}>${MONTH_NAMES[o.month]} de ${o.year}</option>`).join('')}
        </select>
        <label class="gs-field-label">Semana</label>
        <select id="gsWeekWeek" class="gs-select"></select>
        <p class="gs-note-empty" id="gsWeekError"></p>
        <div class="gs-modal-actions">
          <button class="gs-btn-secondary" id="gsCancel">Cancelar</button>
          <button class="gs-btn-primary" id="gsSave">Aplicar</button>
        </div>
      </div>
    `;
    root.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    document.getElementById('gsCancel').addEventListener('click', () => overlay.remove());

    const monthSelect = document.getElementById('gsWeekMonth');
    const weekSelect = document.getElementById('gsWeekWeek');

    function populateWeeks(){
      const [y, m] = monthSelect.value.split('-').map(Number);
      const weeks = weeksInMonth(y, m);
      weekSelect.innerHTML = weeks.map((w, i) => {
        const end = addDays(w, 6);
        const isCurrent = toISODate(w) === toISODate(weekStart);
        return `<option value="${toISODate(w)}" ${isCurrent ? 'selected' : ''}>Semana ${i + 1} (${fmtDateShort(w)} a ${fmtDateShort(end)})</option>`;
      }).join('');
    }
    populateWeeks();
    monthSelect.addEventListener('change', populateWeeks);

    document.getElementById('gsSave').addEventListener('click', async () => {
      const errorEl = document.getElementById('gsWeekError');
      const value = weekSelect.value;
      if (!value) { errorEl.textContent = 'Selecione uma semana.'; return; }
      weekStart = parseISODate(value);
      await saveData();
      overlay.remove();
      renderDashboard();
    });
  }

      const dateStr = document.getElementById('gsCommitDate').value;
      if (!dateStr) { errorEl.textContent = 'Informe a data do compromisso.'; return; }
      const slotIndex = parseInt(document.getElementById('gsCommitSlot').value, 10);
      const dateObj = parseISODate(dateStr);
      const dayLabel = DAYS[dateObj.getDay()];

      const clash = commitments.find(cm => cm.date === dateStr && cm.slotIndex === slotIndex);
      if (clash) { errorEl.textContent = 'Já existe um compromisso cadastrado nesse dia e horário.'; return; }

      const dIdxInWeek = Math.round((dateObj - startOfWeek(dateObj)) / 86400000);
      const dateWeekStart = toISODate(startOfWeek(dateObj));
      const classAtSlot = classes.find(c => c.day === dIdxInWeek && c.slotIndex === slotIndex && c.week === dateWeekStart);
      if (classAtSlot) {
        if (!(await askConfirm(`Já existe a matéria "${classAtSlot.subject}" nesse horário nessa semana. O compromisso vai aparecer no lugar dela nessa data. Continuar?`))) return;
      }

      const local = document.getElementById('gsCommitLocal').value.trim();
      const obs = document.getElementById('gsCommitObs').value.trim();
      commitments.push({ id: uid(), title, date: dateStr, day: dayLabel, slotIndex, local, obs, ts: Date.now() });
      await saveData();
      overlay.remove();
      renderDashboard();
    });
  }

              <div id="gsMatList">
                ${mats.length ? mats.map(m => `
                  <div class="gs-detail-field gs-detail-field-static">
                    <span class="gs-detail-field-label">${esc(m.author)}</span>
                    ${m.text ? `<span class="gs-detail-field-value">${esc(m.text)}</span>` : ''}
                    ${m.file ? `
                      <a href="${m.file.dataUrl}" download="${esc(m.file.name)}" class="gs-file-chip">
                        📎 ${esc(m.file.name)} <span class="gs-file-chip-size">(${fmtFileSize(m.file.size)})</span>
                      </a>
                    ` : ''}
                  </div>
                `).join('') : '<p class="gs-note-empty">Nenhum material anexado ainda.</p>'}
              </div>

              ${canEdit ? `
                <p class="gs-note-block-title">Anexar novo material</p>
                <div class="gs-add-note-row" style="flex-wrap:wrap; gap:6px">
                  <input id="gsMatInput" class="gs-input" placeholder="Descrição do material (opcional)..." style="flex:1 1 100%" />
                  <label class="gs-file-btn" for="gsMatFile">📎 Anexar arquivo</label>
                  <input id="gsMatFile" type="file" style="display:none" />
                  <button id="gsAddMat" style="flex:1">Adicionar</button>
                  <span id="gsMatFileName" class="gs-file-name"></span>
                </div>
              ` : `<p class="gs-note-empty" style="margin-top:8px">${isInstrutor ? `Você só pode anexar materiais nas suas matérias: ${esc((session.subjects || []).join(', '))}.` : 'Apenas o instrutor da matéria ou o administrador podem anexar novos materiais.'}</p>`}

              <div class="gs-modal-actions">
                <button class="gs-btn-secondary" id="gsBackBtn2">Voltar</button>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('gsLogout').addEventListener('click', () => { session = null; renderLogin(); });
      document.getElementById('gsBackToGrid').addEventListener('click', () => renderDashboard());
      document.getElementById('gsBackBtn2').addEventListener('click', () => renderDashboard());

      if (canEdit) {
        const matFileInput = document.getElementById('gsMatFile');
        const matFileNameEl = document.getElementById('gsMatFileName');
        matFileInput.addEventListener('change', () => {
          const f = matFileInput.files[0];
          if (!f) { pendingFile = null; matFileNameEl.textContent = ''; return; }
          if (f.size > MAX_FILE_BYTES) {
            alert(`Arquivo muito grande (${fmtFileSize(f.size)}). Escolha um arquivo de até ${fmtFileSize(MAX_FILE_BYTES)}.`);
            matFileInput.value = '';
            pendingFile = null;
            matFileNameEl.textContent = '';
            return;
          }
          const reader = new FileReader();
          reader.onload = () => {
            pendingFile = { name: f.name, type: f.type, size: f.size, dataUrl: reader.result };
            matFileNameEl.textContent = '📎 ' + f.name + ' (' + fmtFileSize(f.size) + ')';
          };
          reader.onerror = () => { alert('Não foi possível ler o arquivo.'); };
          reader.readAsDataURL(f);
        });

        document.getElementById('gsAddMat').addEventListener('click', async () => {
          const input = document.getElementById('gsMatInput');
          const text = input.value.trim();
          if (!text && !pendingFile) return;
          if (!subjectMaterials[subject]) subjectMaterials[subject] = [];
          subjectMaterials[subject].push({ id: uid(), text, author: session.name ? session.name : `NIP ${session.nip}`, ts: Date.now(), file: pendingFile || null });
          pendingFile = null;
          await saveData();
          renderBody();
        });
      }
    }

    renderBody();
  }

  // ---------------- INIT ----------------
  async function init(){
    root.innerHTML = `<div class="gs-login-wrap"><p style="color:#F0F4EF;font-family:'IBM Plex Mono',monospace;font-size:13px;">Carregando grade...</p></div>`;
    await loadData();
    renderLogin();
  }

  init();
})();
</script>
</body>
</html>
